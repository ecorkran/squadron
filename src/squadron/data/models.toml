# Built-in model aliases for squadron.
# Format is identical to ~/.config/squadron/models.toml — users can copy
# entries directly between the two files.
#
# Fields:
#   profile    (required) — provider profile name
#   model      (required) — full model identifier
#   private    (optional) — bool; true = not shown in public listings
#   cost_tier  (optional) — "subscription" | "cheap" | "moderate" | "expensive"
#   notes      (optional) — free-form human-readable note
#   [aliases.<name>.pricing]  (optional sub-table)
#     input, output, cache_read, cache_write — USD per 1M tokens

# ---------------------------------------------------------------------------
# Claude family — Max subscription, no per-token pricing
# ---------------------------------------------------------------------------

[aliases.opus]
profile = "sdk"
model = "claude-opus-4-6"
private = true
cost_tier = "subscription"
notes = "Max sub"

[aliases.sonnet]
profile = "sdk"
model = "claude-sonnet-4-6"
private = true
cost_tier = "subscription"
notes = "Max sub"

[aliases.haiku]
profile = "sdk"
model = "claude-haiku-4-5-20251001"
private = true
cost_tier = "subscription"
notes = "Max sub"

