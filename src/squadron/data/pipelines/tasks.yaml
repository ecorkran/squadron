name: tasks
description: Tasks lifecycle — task breakdown through implementation

params:
  slice: required
  model: sonnet
  review-model: minimax

steps:
  - tasks:
      phase: 5
      model: "{model}"
      review: 
        template: tasks
        model: "{review-model}"
      checkpoint: on-concerns

  - compact:
      template: minimal

  - implement:
      phase: 6
      model: "{model}"
      review:
        template: code
        model: "{review-model}"
      checkpoint: on-fail

  - compact:
      template: minimal
      model: minimax

  - devlog: auto
