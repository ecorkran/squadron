name: tasks
description: Tasks lifecycle — task breakdown through implementation

params:
  slice: required
  review-model: minimax

steps:
  - tasks:
      phase: 5
      model: sonnet
      review: 
        template: tasks
        model: {review-model}
      checkpoint: on-fail

  - compact:
      template: minimal

  - implement:
      phase: 6
      model: sonnet
      review:
        template: code
        model: {review-model}
      checkpoint: on-fail

  - compact:
      template: minimal
      model: minimax

  - devlog: auto
