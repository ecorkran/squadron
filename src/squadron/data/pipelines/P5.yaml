name: P5
description: Break slice into tasks (phase 5) with review

params:
  slice: required
  review-model: minimax

steps:
  - tasks:
      phase: 5
      model: sonnet
      review:
        template: tasks
        model: {review-model}
      checkpoint: on-fail

  - summary:
      template: minimal-sdk
      model: minimax
      emit: [stdout, clipboard]