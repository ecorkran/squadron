name: P6
description: Implement slice (phase 6) with review

params:
  slice: required
  model: sonnet
  review-model: minimax

steps:
  - implement:
      phase: 6
      model: "{model}"
      review:
        template: code
        model: "{review-model}"
      checkpoint: on-fail

  - compact:
      template: minimal-sdk
      model: minimax
      emit: [stdout, clipboard, file]
  - devlog: auto
