name: test-pipeline
description: Pipeline for testing pipelines.

params:
  slice: required

steps:
  - design:
      phase: 4
      model: haiku
      review: 
        template: slice
        model: minimax
      checkpoint: on-fail

  - tasks:
      phase: 5
      model: haiku
      review: 
        template: tasks
        model: minimax
      checkpoint: on-fail

  # summary with emit:rotate is equivalent to compact — preferred for new pipelines.
  # Use compact: when the emit destinations don't matter (backward-compatible alias).
  - summary:
      template: minimal-sdk
      model: haiku
      emit: [rotate]

  - design:        # same slice, should now "remember" prior design via summary
      phase: 4
      model: haiku