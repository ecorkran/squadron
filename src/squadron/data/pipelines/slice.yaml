name: slice
description: Full slice lifecycle — design through implementation

params:
  slice: required

steps:
  - design:
      phase: 4
      model: opus
      review: 
        template: slice
        model: glm5
      checkpoint: on-concerns

  - tasks:
      phase: 5
      model: sonnet
      review: 
        template: tasks
        model: minimax
      checkpoint: on-fail

  - compact:
      template: minimal

  - implement:
      phase: 6
      model: sonnet
      review:
        template: code
        model: minimax
      checkpoint: on-fail

  - compact:
      template: minimal

  - devlog: auto
