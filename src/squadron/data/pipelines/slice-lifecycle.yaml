name: slice-lifecycle
description: Full slice lifecycle — design through implementation

params:
  slice: required
  model: opus

steps:
  - design:
      phase: 4
      review: arch
      checkpoint: on-concerns

  - tasks:
      phase: 5
      review: tasks
      checkpoint: on-fail

  - compact:
      keep: [design, tasks]
      summarize: true

  - implement:
      phase: 6
      review:
        template: code
      checkpoint: on-fail

  - devlog: auto
