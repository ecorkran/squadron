name: P4
description: Design a slice (phase 4) with review and human checkpoint

params:
  slice: required
  model: opus
  review-model: minimax

steps:
  - design:
      phase: 4
      model: {model}
      review:
        template: slice
        model: {review-model}

  - summary:
      template: minimal-sdk
      model: minimax
      emit: [stdout, clipboard]